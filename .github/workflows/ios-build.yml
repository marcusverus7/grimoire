name: iOS Build → TestFlight

# Builds the Grimoire iOS app on a macOS runner using expo prebuild +
# xcodebuild. Does NOT use EAS cloud build credits. Trigger manually
# from the Actions tab or on push to main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      COREPACK_INTEGRITY_KEYS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode signing materials
        env:
          IOS_DIST_P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/grimoire-creds"
          printf '%s' "$IOS_DIST_P12_BASE64" | tr -d '[:space:]' | base64 --decode > "$HOME/grimoire-creds/ios_dist.p12"
          printf '%s' "$IOS_PROVISION_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode > "$HOME/grimoire-creds/Grimoire_AppStore.mobileprovision"
          ls -l "$HOME/grimoire-creds"

      - name: Install provisioning profile
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$HOME/grimoire-creds/Grimoire_AppStore.mobileprovision" "$PROFILES_DIR/"

      - name: Import cert into keychain
        env:
          IOS_DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
        run: |
          security create-keychain -p "temppass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temppass" build.keychain
          security import "$HOME/grimoire-creds/ios_dist.p12" \
            -k build.keychain \
            -P "$IOS_DIST_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "temppass" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Run expo prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: |
          gem install cocoapods --no-document 2>/dev/null || true
          pod install

      - name: Write ExportOptions.plist
        run: |
          cat > "$GITHUB_WORKSPACE/ExportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>JQS67937W6</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.grimoirettrpg.app</key>
              <string>Grimoire App Store</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLIST

      - name: Pre-bundle JS (surface Metro errors before xcodebuild)
        working-directory: apps/mobile
        run: |
          node -e "require('./babel.config.js')({ cache: () => {} })" && echo "Babel config OK"
          npx expo export:embed \
            --platform ios \
            --bundle-output /tmp/main.jsbundle \
            --assets-dest /tmp/ios-assets \
            --dev false
          echo "Bundle size: $(du -sh /tmp/main.jsbundle)"

      - name: Build archive
        working-directory: apps/mobile/ios
        run: |
          echo "=== iOS directory contents ==="
          ls -la
          # Use -d so ls doesn't expand the xcworkspace directory
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: no .xcworkspace found"; exit 1
          fi
          SCHEME=$(echo "$WORKSPACE" | sed 's/\.xcworkspace//')
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          set -o pipefail
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$GITHUB_WORKSPACE/grimoire.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="Grimoire App Store" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=JQS67937W6

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/grimoire.xcarchive" \
            -exportPath "$GITHUB_WORKSPACE/export" \
            -exportOptionsPlist "$GITHUB_WORKSPACE/ExportOptions.plist"
          ls -la "$GITHUB_WORKSPACE/export/"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: grimoire-ipa
          path: export/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_API_KEY_BASE64" | tr -d '[:space:]' | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(ls "$GITHUB_WORKSPACE/export/"*.ipa | head -1)
          echo "Uploading $IPA"
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
