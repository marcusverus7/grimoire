name: iOS Build → TestFlight

# Builds the Grimoire iOS app on a macOS runner using expo prebuild +
# xcodebuild. Does NOT use EAS cloud build credits. Trigger manually
# from the Actions tab or on push to main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/ios-build.yml'
      - '.github/scripts/**'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120
    env:
      COREPACK_INTEGRITY_KEYS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Symlink babel-preset-expo into apps/mobile/node_modules
        run: |
          # babel-preset-expo is a transitive dep of expo, only in pnpm virtual store.
          # @babel/core resolves it via { paths: [apps/mobile] } — create a direct symlink
          # so Metro's jest-worker child processes can find it without pnpm store traversal.
          PRESET_DIR=$(node -e "const p=require('path'),fs=require('fs');const e=p.dirname(require.resolve('expo/package.json',{paths:[p.resolve('apps/mobile')]}));const r=fs.realpathSync(e);process.stdout.write(p.dirname(require.resolve('babel-preset-expo/package.json',{paths:[r]})))")
          echo "babel-preset-expo at: $PRESET_DIR"
          if [ -z "$PRESET_DIR" ]; then echo "ERROR: could not locate babel-preset-expo"; exit 1; fi
          ln -sfn "$PRESET_DIR" apps/mobile/node_modules/babel-preset-expo
          echo "Symlinked apps/mobile/node_modules/babel-preset-expo -> $PRESET_DIR"

      - name: Decode signing materials
        env:
          IOS_DIST_P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/grimoire-creds"
          printf '%s' "$IOS_DIST_P12_BASE64" | tr -d '[:space:]' | base64 --decode > "$HOME/grimoire-creds/ios_dist.p12"
          printf '%s' "$IOS_PROVISION_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode > "$HOME/grimoire-creds/Grimoire_AppStore.mobileprovision"
          ls -l "$HOME/grimoire-creds"

      - name: Install provisioning profile
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          PROFILE="$HOME/grimoire-creds/Grimoire_AppStore.mobileprovision"
          # Extract the profile's REAL internal Name + UUID. The filename
          # ("Grimoire_AppStore") is NOT what Xcode matches against — for
          # Apple-managed profiles the Name is an auto-generated string.
          # Hardcoding "Grimoire_AppStore" is what made every prior build fail
          # with "No profile matching Grimoire_AppStore".
          security cms -D -i "$PROFILE" > /tmp/profile.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          echo "Profile Name: $PROFILE_NAME"
          echo "Profile UUID: $PROFILE_UUID"
          # Xcode looks profiles up by <UUID>.mobileprovision — install under that name.
          cp "$PROFILE" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Import cert into keychain
        env:
          IOS_DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
        run: |
          security create-keychain -p "temppass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temppass" build.keychain
          # CRITICAL: disable the keychain auto-lock timeout (default 300s) and
          # lock-on-sleep. Without this the keychain re-locks during the long
          # Xcode compile, then codesign HANGS FOREVER in the "Embed Pods
          # Frameworks" phase waiting for keychain auth that never comes in
          # headless CI — the cause of every prior 2.5–4h build timeout.
          security set-keychain-settings build.keychain
          security import "$HOME/grimoire-creds/ios_dist.p12" \
            -k build.keychain \
            -P "$IOS_DIST_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "temppass" build.keychain
          security find-identity -v -p codesigning build.keychain
          # Derive CODE_SIGN_IDENTITY from the cert actually present (e.g.
          # "iPhone Distribution: ..."), instead of hardcoding "Apple Distribution"
          # which never matched this account's cert.
          SIGN_ID=$(security find-identity -v -p codesigning build.keychain | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          echo "Using signing identity: $SIGN_ID"
          echo "SIGN_IDENTITY=$SIGN_ID" >> "$GITHUB_ENV"

      - name: Run expo prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --clean --non-interactive --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-${{ runner.os }}-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}-${{ hashFiles('apps/mobile/package.json') }}
          restore-keys: |
            derived-${{ runner.os }}-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}-
            derived-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: |
          gem install cocoapods --no-document 2>/dev/null || true
          pod install

      - name: Write ExportOptions.plist
        run: |
          # Unquoted heredoc so $PROFILE_UUID (from the install step) expands.
          # Manual signing requires an explicit bundleID -> profile mapping or
          # -exportArchive fails after the archive succeeds.
          cat > "$GITHUB_WORKSPACE/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>JQS67937W6</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.grimoirettrpg.app</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          echo "--- ExportOptions.plist ---"
          cat "$GITHUB_WORKSPACE/ExportOptions.plist"

      - name: Pre-bundle JS and create expo-filter CLI wrapper
        working-directory: apps/mobile
        run: |
          # Hard-code the CI node path so xcodebuild's bundle phase finds it
          NODE_PATH="$(which node)"
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          echo "NODE_BINARY set to $NODE_PATH"

          # Locate expo's real CLI bin entry point
          EXPO_CLI="$("$NODE_PATH" -e "const p=require.resolve('expo/package.json');const d=require('path').dirname(p);const b=require(p).bin;const e=typeof b==='string'?b:(b.expo||b);console.log(require('path').join(d,e))")"
          echo "EXPO_CLI=$EXPO_CLI"

          # Copy the wrapper script from repo — strips --config-cmd before calling expo.
          # (Inline heredoc would fail because YAML block-literal strips indentation,
          # which conflicts with the closing delimiter needing to be at column 0.)
          cp "$GITHUB_WORKSPACE/.github/scripts/expo-filter.js" /tmp/expo-filter.js
          chmod +x /tmp/expo-filter.js
          echo "EXPO_CLI_PATH=$EXPO_CLI" >> "$GITHUB_ENV"

          # Pre-bundle to verify Metro/Babel works (readable error output)
          npx expo export:embed \
            --platform ios \
            --bundle-output /tmp/main.jsbundle \
            --assets-dest /tmp/ios-assets \
            --dev false
          echo "Bundle size: $(du -sh /tmp/main.jsbundle)"

      - name: Build archive
        working-directory: apps/mobile/ios
        env:
          REAL_EXPO_CLI: ${{ env.EXPO_CLI_PATH }}
        run: |
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: no .xcworkspace found"; exit 1
          fi
          SCHEME=$(echo "$WORKSPACE" | sed 's/\.xcworkspace//')
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          echo "CLI_PATH wrapper: /tmp/expo-filter.js (strips --config-cmd)"
          echo "REAL_EXPO_CLI=$REAL_EXPO_CLI"
          set -o pipefail
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$GITHUB_WORKSPACE/grimoire.xcarchive" \
            -destination "generic/platform=iOS" \
            -parallelizeTargets \
            -jobs $(sysctl -n hw.ncpu) \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM=JQS67937W6 \
            NODE_BINARY="$(which node)" \
            CLI_PATH="/tmp/expo-filter.js" \
            BUNDLE_COMMAND="export:embed"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/grimoire.xcarchive" \
            -exportPath "$GITHUB_WORKSPACE/export" \
            -exportOptionsPlist "$GITHUB_WORKSPACE/ExportOptions.plist"
          ls -la "$GITHUB_WORKSPACE/export/"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: grimoire-ipa
          path: export/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_API_KEY_BASE64" | tr -d '[:space:]' | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(ls "$GITHUB_WORKSPACE/export/"*.ipa | head -1)
          echo "Uploading $IPA"
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
