workflows:
  grimoire-ios:
    name: Grimoire iOS → TestFlight
    max_build_duration: 120
    environment:
      node: 22.13.1
      xcode: latest
      cocoapods: default
      groups:
        - app_store_connect
      vars:
        BUNDLE_ID: "com.grimoirettrpg.app"
        DEVELOPMENT_TEAM: "JQS67937W6"

    scripts:
      - name: Install pnpm
        script: |
          pnpm --version 2>/dev/null || npm install -g pnpm@9 --force
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Install dependencies
        script: |
          export COREPACK_INTEGRITY_KEYS=0
          pnpm install --frozen-lockfile

      - name: Symlink babel-preset-expo
        script: |
          PRESET_DIR=$(node -e "const p=require('path'),fs=require('fs');const e=p.dirname(require.resolve('expo/package.json',{paths:[p.resolve('apps/mobile')]}));const r=fs.realpathSync(e);process.stdout.write(p.dirname(require.resolve('babel-preset-expo/package.json',{paths:[r]})))")
          echo "babel-preset-expo at: $PRESET_DIR"
          if [ -z "$PRESET_DIR" ]; then echo "ERROR: could not locate babel-preset-expo"; exit 1; fi
          ln -sfn "$PRESET_DIR" apps/mobile/node_modules/babel-preset-expo
          echo "Symlinked OK"

      - name: Expo prebuild
        script: |
          cd apps/mobile
          npx expo prebuild --platform ios --clean --non-interactive --no-install

      - name: Install CocoaPods
        script: |
          cd apps/mobile/ios
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          # Write ASC private key to disk for xcodebuild -allowProvisioningUpdates
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          echo "ASC_KEY_PATH=/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" >> "$CM_ENV"
          echo "ASC key written: $(wc -c < /tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8) bytes"

      - name: Pre-bundle JavaScript
        script: |
          cd apps/mobile
          NODE_PATH="$(which node)"
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local

          # Locate expo CLI entry point inside the pnpm virtual store
          EXPO_CLI="$(node -e "const p=require('path');const pkg=require.resolve('expo/package.json',{paths:[p.resolve('.')]});const d=p.dirname(pkg);const b=require(pkg).bin;const e=typeof b==='string'?b:(b.expo||b);process.stdout.write(p.join(d,e))")"
          echo "Expo CLI: $EXPO_CLI"
          echo "EXPO_CLI_PATH=$EXPO_CLI" >> "$CM_ENV"

          # Copy the expo-filter wrapper (strips --config-cmd/--entry-file/--reset-cache)
          cp "../../.github/scripts/expo-filter.js" /tmp/expo-filter.js
          chmod +x /tmp/expo-filter.js

          # Pre-bundle to warm Metro cache in the correct process context
          REAL_EXPO_CLI="$EXPO_CLI" npx expo export:embed \
            --platform ios \
            --bundle-output /tmp/main.jsbundle \
            --assets-dest /tmp/ios-assets \
            --dev false
          echo "Bundle size: $(du -sh /tmp/main.jsbundle)"

      - name: Build archive
        script: |
          cd apps/mobile/ios
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          echo "REAL_EXPO_CLI=$EXPO_CLI_PATH"
          export REAL_EXPO_CLI="$EXPO_CLI_PATH"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/grimoire.xcarchive" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            NODE_BINARY="$(which node)" \
            CLI_PATH="/tmp/expo-filter.js" \
            BUNDLE_COMMAND="export:embed"

      - name: Export IPA
        script: |
          cat > "$CM_BUILD_DIR/ExportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>JQS67937W6</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/grimoire.xcarchive" \
            -exportPath "$CM_BUILD_DIR/export" \
            -exportOptionsPlist "$CM_BUILD_DIR/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
          ls -la "$CM_BUILD_DIR/export/"

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
